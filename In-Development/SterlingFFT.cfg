// Tweaks "Sterling Engines: Fusion" to integrate better with Far Future Technologies.

// Specifically, it removes the Sterling Discovery engine (reduntant) and re-specs the ICF drives.
// Their integrated reactors are removed (inconsistent with the FFT ICF engines), and replaced with ModuleChargableEngine
// ICF drives are also moved to a more appropriate tech node. 

-PART[strl-eng-375-mcf]:NEEDS[SterlingSystems] {}

@PART[strl-eng-250-icf]:NEEDS[SterlingSystems]:FINAL
{
    @TechRequired = quantumReactions
	-MODULE[ModuleFusionEngine] {}

	MODULE
	{
		name = ModuleChargeableEngine

		Charged = false
		ChargeRate = 10
		ChargeAmount = 0
		ChargeGoal = 1000
		
		ShutdownEngineOnLowThrottle = true
		MinimumThrottleFraction = 0.001
  }
}

@PART[strl-eng-500-icf]:NEEDS[SterlingSystems]:FINAL
{
    @TechRequired = quantumReactions
	-MODULE[ModuleFusionEngine] {}

	MODULE
	{
		name = ModuleChargeableEngine

		Charged = false
		ChargeRate = 10
		ChargeAmount = 0
		ChargeGoal = 3500
		
		ShutdownEngineOnLowThrottle = true
		MinimumThrottleFraction = 0.001
  }
}