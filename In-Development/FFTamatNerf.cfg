// Patch by Caliperstorm
// Significantly reduces the amount of antimatter produced by Far Future Technologies' Nova antimatter factory part.
// Currently the part is absurdly overpowered. The description and part model clearly show that it is supposed to be a laser pair-production device, which produces antimatter from electric power. However, the part is capable of producing 1 kg/s of antimatter from only 10MW of input power! That's 8,987,551,787,368% efficiency!
// Even if you assume instead that it's a Q-mirror or something, then it's still breaking conservation of mass/energy (i.e. consumes 2kg/s of fission pellets, produces 5kg/s antimatter)
// Obviously having it be 100% realistic wouldn't be very fun, but I thought it should be at least a little bit more in-line with reality.
// Taking a cue from Silly Photon Drives, I decided that 1,000,000x efficiency sounds good. This translates to about a 100,000x drop in output rate. 
// At the new values it will now take a single Nova factory 6.5 Kerbin years to fill the largest antimatter tank, where before it only took 600 seconds. You should probably build an array of them, then!
// One of the main reasons I wrote this is to stop people from building ISVs that make their own antimatter in-flight. You can probably still do it to some extent, but there will be no more conversion drives on my watch!

@PART[fft-antimatter-factory-1]:FINAL
{
	@MODULE[ModuleSystemHeatConverter],0
	{
		@INPUT_RESOURCE:HAS[#ResourceName[LqdHydrogen]]
		{
			@Ratio = 0.001
		}
		@OUTPUT_RESOURCE:HAS[#ResourceName[Antimatter]]
		{
			@Ratio = 0.00005
		}
	}
	@MODULE[ModuleSystemHeatConverter],1
	{
		@INPUT_RESOURCE:HAS[#ResourceName[FissionPellets]]
		{
			@Ratio = 0.001
		}
		@OUTPUT_RESOURCE:HAS[#ResourceName[Antimatter]]
		{
			@Ratio = 0.005
		}
	}
}